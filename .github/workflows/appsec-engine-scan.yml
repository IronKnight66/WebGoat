name: AppSec Engine Security Scan

# Runs appsec-engine (https://github.com/IronKnight66/appsec-engine) against
# the WebGoat codebase on every push and pull request to main/master, and on
# a daily schedule.  Results are uploaded to GitHub Code Scanning (SARIF) and
# saved as downloadable artifacts.  PRs receive an automated comment with a
# scan summary.
#
# NOTE: WebGoat is intentionally full of vulnerabilities.  The workflow uses
# --fail-on high so that it acts as a real security gate: any high or critical
# finding causes the job to exit non-zero.  Change to --fail-on critical if
# you want the gate to trigger only on the most severe issues.

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  schedule:
    # Daily at 03:00 UTC — offset from the Dependabot workflows to avoid
    # concurrent artifact contention
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      fail_on:
        description: 'Minimum severity that fails the build'
        required: false
        default: 'high'
        type: choice
        options:
          - critical
          - high
          - medium
          - low
      create_issues:
        description: 'Open GitHub issues for findings'
        required: false
        default: false
        type: boolean
      issue_severity:
        description: 'Minimum severity to open issues for'
        required: false
        default: 'high'
        type: choice
        options:
          - critical
          - high
          - medium
          - low
      use_llm_fixes:
        description: 'Generate LLM fixes and open a single auto-fix PR (requires APPSEC_ANTHROPIC_API_KEY secret)'
        required: false
        default: false
        type: boolean
      fix_severity:
        description: 'Severities to generate LLM fixes for'
        required: false
        default: 'critical,high'
        type: choice
        options:
          - 'critical'
          - 'critical,high'
          - 'critical,high,medium'

permissions:
  contents: read
  security-events: write   # required to upload SARIF to GitHub Code Scanning
  pull-requests: write     # required to post PR comments
  issues: write            # required to create/label GitHub issues for findings
  actions: read

jobs:
  appsec-engine-scan:
    name: AppSec Engine — SAST / SCA / Secrets Scan
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Source checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history lets TruffleHog scan all commits

      # -----------------------------------------------------------------------
      # 2. Python runtime — appsec-engine requires Python 3.11+
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # No pip cache: WebGoat is a Java project with no requirements.txt
          # or pyproject.toml, which setup-python requires to hash for caching

      # -----------------------------------------------------------------------
      # 3. Install appsec-engine directly from the GitHub repository so we
      #    always run the latest version without waiting for a PyPI release.
      #    The [tools] extra pulls in the semgrep / bandit / pip-audit /
      #    safety / trufflehog integration wrappers.
      # -----------------------------------------------------------------------
      - name: Install AppSec Engine from GitHub
        env:
          # Dedicated PAT (classic, repo scope) with read access to
          # IronKnight66/appsec-engine. Stored as APPSEC_ENGINE_PAT in
          # WebGoat's repository secrets.
          GH_PAT: ${{ secrets.APPSEC_ENGINE_PAT }}
        run: |
          pip install "git+https://${GH_PAT}@github.com/IronKnight66/appsec-engine.git"

      # -----------------------------------------------------------------------
      # 4. Install the underlying security tools.
      #    On Linux (ubuntu-latest) semgrep is fully supported — this is the
      #    primary multi-language SAST tool used for Java source analysis.
      # -----------------------------------------------------------------------
      - name: Install security scanning tools
        run: |
          pip install semgrep bandit safety pip-audit
          # Verify tools are on PATH
          semgrep --version
          bandit --version
          pip-audit --version

      # -----------------------------------------------------------------------
      # 5. Run the full appsec-engine scan.
      #
      #    Flags explained:
      #      --ci-mode          non-interactive, machine-readable output
      #      --format sarif     SARIF output for GitHub Code Scanning upload
      #      --output           write SARIF to a file alongside the run
      #      --compliance-report generate an HTML audit report artifact
      #      --fail-on high     exit 1 when any high/critical finding is found;
      #                         overridable via workflow_dispatch input
      #
      #    continue-on-error: true ensures that even when findings are present
      #    (exit 1) the subsequent upload and comment steps still execute.
      #    The final "Enforce security gate" step re-raises the failure after
      #    all artifacts have been saved.
      # -----------------------------------------------------------------------
      - name: Run AppSec Engine scan
        id: scan
        continue-on-error: true
        run: |
          FAIL_ON="${FAIL_ON_INPUT:-high}"

          appsec scan . \
            --ci-mode \
            --format sarif \
            --output appsec-results.sarif \
            --compliance-report appsec-compliance-report.html \
            --compliance-format html \
            --fail-on "${FAIL_ON}"

          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      # Capture actual exit code from the step outcome so later steps can
      # distinguish "scan ran and found issues" from "scan failed to run".
      - name: Record scan outcome
        id: outcome
        if: always()
        run: |
          if [ "${{ steps.scan.outcome }}" = "success" ]; then
            echo "findings=false" >> "$GITHUB_OUTPUT"
          else
            echo "findings=true"  >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # 6. Ensure output files exist even if the scan terminated early, so
      #    artifact-upload steps never fail with "file not found".
      # -----------------------------------------------------------------------
      - name: Ensure output files exist
        if: always()
        run: |
          # CodeQL upload-sarif requires at least one run entry; provide a
          # valid minimal SARIF so the upload step doesn't fail with
          # "1 item required; only 0 were supplied" when the scan didn't run.
          if [ ! -f appsec-results.sarif ]; then
            cat > appsec-results.sarif <<'SARIF'
          {"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"appsec-engine","version":"0.0.0","rules":[]}},"results":[]}]}
          SARIF
          fi
          if [ ! -f appsec-compliance-report.html ]; then
            echo '<html><body><p>Scan did not produce a compliance report.</p></body></html>' \
              > appsec-compliance-report.html
          fi

      # -----------------------------------------------------------------------
      # 7. Publish a rich findings summary to the GitHub Actions job summary
      #    page so results are visible directly in the Actions UI without
      #    needing to download any artifact.
      # -----------------------------------------------------------------------
      - name: Publish findings summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          sarif_path = "appsec-results.sarif"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

          try:
              with open(sarif_path) as f:
                  sarif = json.load(f)
          except Exception as e:
              with open(summary_path, "a") as out:
                  out.write(f"## AppSec Engine Scan\n\n> Could not parse SARIF: {e}\n")
              sys.exit(0)

          total = error = warning = note = 0
          tool_counts = {}
          high_findings = []

          for run in sarif.get("runs", []):
              tool = run.get("tool", {}).get("driver", {}).get("name", "unknown")
              run_count = 0
              for result in run.get("results", []):
                  total += 1
                  run_count += 1
                  level = result.get("level", "warning")
                  if level == "error":   error += 1
                  elif level == "note":  note += 1
                  else:                  warning += 1
                  if level == "error":
                      loc = result.get("locations", [{}])[0]
                      phys = loc.get("physicalLocation", {})
                      uri = phys.get("artifactLocation", {}).get("uri", "?")
                      line = phys.get("region", {}).get("startLine", "?")
                      msg = result.get("message", {}).get("text", "")[:120]
                      high_findings.append((tool, uri, line, msg))
              tool_counts[tool] = run_count

          status = "FINDINGS DETECTED" if total > 0 else "CLEAN"
          icon = "🔴" if error > 0 else ("🟡" if warning > 0 else "✅")

          lines = [
              f"## {icon} AppSec Engine Security Scan — {status}",
              "",
              "### Summary",
              "",
              "| Severity | Count |",
              "|----------|-------|",
              f"| 🔴 Critical / High | {error} |",
              f"| 🟡 Medium | {warning} |",
              f"| 🔵 Low / Info | {note} |",
              f"| **Total** | **{total}** |",
              "",
              "### Results by Tool",
              "",
              "| Tool | Findings |",
              "|------|----------|",
          ]
          for tool, count in sorted(tool_counts.items()):
              lines.append(f"| {tool} | {count} |")

          if high_findings:
              lines += [
                  "",
                  "### High / Critical Findings (first 20)",
                  "",
                  "| Tool | File | Line | Description |",
                  "|------|------|------|-------------|",
              ]
              for tool, uri, line, msg in high_findings[:20]:
                  safe_msg = msg.replace("|", "\\|").replace("\n", " ")
                  lines.append(f"| {tool} | `{uri}` | {line} | {safe_msg} |")
              if len(high_findings) > 20:
                  lines.append(f"\n> _...and {len(high_findings) - 20} more high/critical findings. Download the compliance report artifact for the full list._")

          lines += [
              "",
              "---",
              "_Download the **compliance report** and **SARIF** artifacts from this run for full details._",
          ]

          with open(summary_path, "a") as out:
              out.write("\n".join(lines) + "\n")

          print(f"Summary written: {total} total findings ({error} high/critical, {warning} medium, {note} low)")
          PYEOF

      # -----------------------------------------------------------------------
      # 8. Upload SARIF to GitHub Code Scanning.
      #    continue-on-error: true — Code Scanning may not be enabled on all
      #    forks or private repos; we don't want to mask the real scan result.
      # -----------------------------------------------------------------------
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: appsec-results.sarif
          category: appsec-engine

      # -----------------------------------------------------------------------
      # 9. Persist compliance report as a workflow artifact (90-day retention
      #    matches the audit-trail retention in the appsec-engine own workflow).
      # -----------------------------------------------------------------------
      - name: Upload compliance report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appsec-compliance-report-${{ github.sha }}
          path: appsec-compliance-report.html
          retention-days: 90

      # -----------------------------------------------------------------------
      # 10. Persist raw SARIF as a fallback artifact (useful when Code Scanning
      #    is not enabled on the repo).
      # -----------------------------------------------------------------------
      - name: Upload SARIF results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appsec-sarif-results-${{ github.sha }}
          path: appsec-results.sarif
          retention-days: 30

      # -----------------------------------------------------------------------
      # 11. Post a summary comment on pull requests.
      # -----------------------------------------------------------------------
      - name: Comment on pull request with scan summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
          GH_SHA: ${{ github.sha }}
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_FAIL_ON: ${{ inputs.fail_on || 'high' }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');

            // Parse SARIF for a quick finding count
            let totalFindings = 0;
            let errorCount = 0;
            let warningCount = 0;
            let noteCount = 0;
            let toolNames = [];

            try {
              const sarif = JSON.parse(fs.readFileSync('appsec-results.sarif', 'utf8'));
              for (const run of sarif.runs || []) {
                const tool = run.tool?.driver?.name;
                if (tool && !toolNames.includes(tool)) toolNames.push(tool);
                for (const result of run.results || []) {
                  totalFindings++;
                  const level = result.level || 'warning';
                  if (level === 'error')   errorCount++;
                  else if (level === 'note') noteCount++;
                  else                     warningCount++;
                }
              }
            } catch (e) {
              console.log('Could not parse SARIF:', e.message);
            }

            const scanPassed = process.env.SCAN_OUTCOME === 'success';
            const statusLine = scanPassed
              ? '✅ **No findings at or above the configured threshold**'
              : `⚠️ **${totalFindings} finding(s) detected** — ${errorCount} critical/high, ${warningCount} medium/low`;

            const toolList = toolNames.length
              ? toolNames.join(', ')
              : 'semgrep, bandit, pip-audit, safety';

            const ghSha = process.env.GH_SHA;
            const ghHeadRef = process.env.GH_HEAD_REF;
            const ghFailOn = process.env.GH_FAIL_ON;
            const ghRepository = process.env.GH_REPOSITORY;
            const ghRunId = process.env.GH_RUN_ID;

            const body = [
              '## 🔒 AppSec Engine Security Scan',
              '',
              statusLine,
              '',
              '| | |',
              '|---|---|',
              `| **Commit** | \`${ghSha}\` |`,
              `| **Branch** | \`${ghHeadRef}\` |`,
              `| **Fail-on threshold** | \`${ghFailOn}\` |`,
              `| **Tools** | ${toolList} |`,
              `| **Scan date** | ${new Date().toUTCString()} |`,
              '',
              '**Artifacts** (available in the [workflow run]' +
              `(https://github.com/${ghRepository}/actions/runs/${ghRunId})):`,
              `- 📄 \`appsec-compliance-report-${ghSha}\` — HTML audit report (90 days)`,
              `- 📊 \`appsec-sarif-results-${ghSha}\` — Raw SARIF file (30 days)`,
              '',
              totalFindings > 0
                ? '> Security findings are also visible in the **Security → Code scanning** tab.'
                : '',
              '',
              '---',
              '_Powered by [AppSec Engine](https://github.com/IronKnight66/appsec-engine)_',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # -----------------------------------------------------------------------
      # 12. Open GitHub issues for findings.
      #
      #     Controlled by the create_issues input (default: false).
      #     Only findings at or above issue_severity (default: high) are
      #     turned into issues.  The step deduplicates against existing open
      #     issues labelled 'appsec-engine' so re-running the workflow never
      #     creates duplicate issues.  Capped at 50 new issues per run to
      #     avoid flooding the issue tracker.
      # -----------------------------------------------------------------------
      - name: Open GitHub issues for findings
        if: inputs.create_issues == true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const minSeverity = '${{ inputs.issue_severity || 'high' }}';
            const SEVERITY_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };
            const minLevel = SEVERITY_ORDER[minSeverity] ?? 1;
            const SEVERITY_EMOJI = { critical: '🔴', high: '🟠', medium: '🟡', low: '🔵' };
            const LABEL_COLORS  = {
              security: 'e11d48', 'appsec-engine': '6366f1',
              critical: '7f1d1d', high: 'b91c1c', medium: 'd97706', low: '1d4ed8',
            };

            // ── 1. Parse SARIF and collect findings above the threshold ──────
            let findings = [];
            try {
              const sarif = JSON.parse(fs.readFileSync('appsec-results.sarif', 'utf8'));
              for (const run of sarif.runs || []) {
                const toolName = run.tool?.driver?.name || 'unknown';
                const rulesById = Object.fromEntries(
                  (run.tool?.driver?.rules || []).map(r => [r.id, r])
                );
                for (const result of run.results || []) {
                  const level = result.level || 'warning';
                  const severity = level === 'error' ? 'high'
                                 : level === 'note'  ? 'low'
                                 :                     'medium';
                  if (SEVERITY_ORDER[severity] > minLevel) continue;

                  const loc  = result.locations?.[0]?.physicalLocation;
                  const uri  = loc?.artifactLocation?.uri || 'unknown';
                  const line = loc?.region?.startLine || 1;
                  const snippet = loc?.region?.snippet?.text || '';
                  const ruleId  = result.ruleId || 'unknown';
                  const rule    = rulesById[ruleId] || {};
                  const title   = rule.shortDescription?.text || rule.name || ruleId;
                  const description = result.message?.text
                                   || rule.fullDescription?.text
                                   || '(no description)';
                  findings.push({ toolName, severity, ruleId, uri, line, snippet, description, title });
                }
              }
            } catch (e) {
              console.error('Failed to parse SARIF:', e.message);
              return;
            }

            console.log(`${findings.length} findings at or above '${minSeverity}' severity`);
            if (findings.length === 0) { console.log('Nothing to do.'); return; }

            // ── 2. Fetch existing open appsec-engine issues for deduplication ─
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'appsec-engine',
              per_page: 100,
            });
            const existingTitles = new Set(existing.map(i => i.title));
            console.log(`${existingTitles.size} existing open appsec-engine issues (dedup check)`);

            // ── 3. Ensure required labels exist ──────────────────────────────
            const neededLabels = new Set(['security', 'appsec-engine',
              ...findings.map(f => f.severity)]);
            for (const name of neededLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name, color: LABEL_COLORS[name] || 'cccccc',
                }).catch(() => {});   // ignore race-condition duplicates
              }
            }

            // ── 4. Create issues (cap at 50 per run) ─────────────────────────
            const MAX_PER_RUN = 50;
            let created = 0, skipped = 0;

            for (const f of findings) {
              if (created >= MAX_PER_RUN) {
                console.log(`Reached per-run cap (${MAX_PER_RUN}). Stopping.`);
                break;
              }

              const issueTitle =
                `[AppSec] ${f.severity.toUpperCase()}: ${f.ruleId} in ${f.uri}`;

              if (existingTitles.has(issueTitle)) { skipped++; continue; }

              const runUrl =
                `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

              const bodyParts = [
                `## ${SEVERITY_EMOJI[f.severity] || '⚪'} ${f.title}`,
                '',
                `> **Auto-generated by AppSec Engine** | [Workflow run](${runUrl}) | Commit: \`${context.sha.slice(0,7)}\``,
                '',
                '| Field | Value |',
                '|-------|-------|',
                `| **Severity** | \`${f.severity.toUpperCase()}\` |`,
                `| **Tool** | ${f.toolName} |`,
                `| **Rule ID** | \`${f.ruleId}\` |`,
                `| **File** | \`${f.uri}\` |`,
                `| **Line** | ${f.line} |`,
                '',
                '### Description',
                '',
                f.description,
                '',
              ];

              if (f.snippet) {
                bodyParts.push(
                  '### Code Snippet', '',
                  '```', f.snippet.slice(0, 500), '```', '',
                );
              }

              bodyParts.push(
                '### Remediation Checklist',
                '',
                '- [ ] Review the finding in the file and line listed above',
                '- [ ] Apply a fix and re-run the security scan to verify',
                '- [ ] Close this issue once the vulnerability is resolved',
                '',
                '---',
                '_Auto-created by the [AppSec Engine Security Scan](https://github.com/IronKnight66/appsec-engine) workflow._',
              );

              try {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body: bodyParts.join('\n'),
                  labels: ['security', 'appsec-engine', f.severity],
                });
                created++;
                existingTitles.add(issueTitle);   // prevent intra-run dupes
                console.log(`Created #${issue.number}: ${issueTitle}`);
              } catch (e) {
                console.error(`Failed to create issue for ${issueTitle}:`, e.message);
              }
            }

            const remaining = findings.length - created - skipped;
            console.log(`\nDone — created: ${created}, skipped (existing): ${skipped}` +
              (remaining > 0 ? `, not processed (cap reached): ${remaining}` : ''));

      # -----------------------------------------------------------------------
      # 13. Enforce the security gate AFTER all artifacts have been saved.
      #     This step re-fails the job when the scan found issues so the
      #     branch protection rule correctly blocks the merge.
      # -----------------------------------------------------------------------
      - name: Enforce security gate
        if: steps.outcome.outputs.findings == 'true'
        env:
          FAIL_ON: ${{ inputs.fail_on || 'high' }}
        run: |
          echo "::error::AppSec Engine detected findings at or above the" \
               "'${FAIL_ON}' threshold." \
               "Review the SARIF results in the Security tab and the" \
               "compliance report artifact before merging."
          exit 1

  # =========================================================================
  # Auto-fix job: scan + LLM fix generation + single PR
  #
  # Only runs when triggered via workflow_dispatch with use_llm_fixes=true.
  # Requires the APPSEC_ANTHROPIC_API_KEY secret to be set in the repository.
  #
  # Flow:
  #   1. Scan the codebase
  #   2. Call Claude to generate CodeFix objects for high/critical findings
  #   3. Apply all fixes, commit to a timestamped branch, push, open one PR
  # =========================================================================
  appsec-engine-autofix:
    name: AppSec Engine — LLM Auto-Fix PR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.use_llm_fixes == true

    permissions:
      contents: write        # push the fix branch
      pull-requests: write   # create the PR
      security-events: write
      workflows: write       # push changes to workflow files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.APPSEC_ENGINE_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install appsec-engine with the [llm] extra so the Anthropic SDK is available
      - name: Install AppSec Engine (with LLM support)
        env:
          GH_PAT: ${{ secrets.APPSEC_ENGINE_PAT }}
        run: |
          pip install "appsec-engine[llm] @ git+https://${GH_PAT}@github.com/IronKnight66/appsec-engine.git"

      - name: Install security scanning tools
        run: |
          pip install semgrep bandit safety pip-audit

      # Configure git identity and auth so appsec-engine can commit and push
      - name: Configure git identity
        env:
          GH_PAT: ${{ secrets.APPSEC_ENGINE_PAT }}
        run: |
          git config user.name  "appsec-engine[bot]"
          git config user.email "appsec-engine[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"

      # Run scan, generate LLM fixes, apply them, and open one PR.
      #
      # Flags:
      #   --pr              create a PR (implies --fix --commit --llm)
      #   --llm             call the LLM to generate fixes
      #   --fix-severity    which severities to fix (from workflow_dispatch input)
      #   --fix-limit 10    cap at 10 LLM calls per run to control cost
      #   --ci-mode         non-interactive
      #   --no-cache        always do a fresh scan
      #   --fail-on low     do not gate the job on findings — we want the PR
      #                     to be created even when findings exist
      - name: Run AppSec Engine scan + auto-fix
        id: autofix
        env:
          APPSEC_ANTHROPIC_API_KEY: ${{ secrets.APPSEC_ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIX_SEV="${{ inputs.fix_severity || 'critical,high' }}"

          appsec scan . \
            --pr \
            --llm \
            --fix-severity "${FIX_SEV}" \
            --fix-limit 10 \
            --ci-mode \
            --no-cache \
            --format text \
            --fail-on low \
            --verbose

